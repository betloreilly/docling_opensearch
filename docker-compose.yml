# Local OpenSearch 3.5 for the Docling demo (k-NN + hybrid search).
# Start: docker compose up -d
# Upgrading from 2.x? Remove the old volume first: docker compose down -v
services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: docling-demo-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=YourStrongPass123!
      - plugins.security.disabled=false
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - docling-demo-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.5.0
    container_name: docling-demo-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: YourStrongPass123!
      OPENSEARCH_SSL_VERIFICATIONMODE: none
    depends_on:
      - opensearch
    networks:
      - docling-demo-net

volumes:
  opensearch-data:

networks:
  docling-demo-net:
